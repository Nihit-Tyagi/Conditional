name: matrix
on: push
jobs:
  build:
    strategy:
      matrix:
        node-version: [18, 20]
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - node-version: 16
            os: ubuntu-latest
        exclude:
          - node-version: 18
            os: macos-latest
          
    runs-on: ${{ matrix.os }}
    steps: 
      - name: Get code
        uses: actions/checkout@v4
      - name: Install Nodejs
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm ci
      - name : Build
        run: npm run build